<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; connect-src 'self' http: https: ws: wss:; script-src 'self'; font-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>agent-mux webui</title>
    <script>
      // Polyfill for Node.js process global in browser environment
      if (typeof window !== 'undefined' && !window.process) {
        window.process = {
          env: {},
          platform: 'browser',
          version: '0.0.0',
          versions: { node: '0.0.0' },
          argv: [],
          pid: 0,
          title: 'browser',
          browser: true,
          nextTick: function(fn) { setTimeout(fn, 0); },
          cwd: function() { return '/'; },
          exit: function() {},
          on: function() {},
          off: function() {},
          emit: function() {},
          removeListener: function() {}
        };
      }
      // Ensure global is available as well
      if (typeof window !== 'undefined' && !window.global) {
        window.global = window;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
