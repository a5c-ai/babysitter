nodeKind: AgentPlatformImpl
id: agent-platform-impl:tula.platform@current
attributes:
  displayName: "tula Platform (current) — composed agent-platform + plugin/skill registry"
  agentVersionId: agent-version:tula@current
  packageRef: source-ref:packages-tula
  subagentDefinitionFormat: js-module-export
  nativeExtensionFormat: babysitter-plugin
  nativeExtensionManifestPath: plugin.json
  nativeExtensionsDirectoryPath:
    - ~/.claude/plugins/
    - .claude/plugins/
    - plugins/
  skillFormat: anthropic-skill-md
  skillsDirectoryPath:
    - ~/.claude/skills/
    - .claude/skills/
    - skills/
  customSlashCommandsPath:
    - commands/
    - .claude/commands/
  subagentsDirectoryPath:
    - agents/
    - .claude/agents/
  hooksDirectoryOrConfigPath:
    - hooks/
    - .claude/hooks.json
  settingsFiles:
    - .claude/settings.json
    - .claude/settings.local.json
  marketplaceUrl: https://github.com/a5c-ai/babysitter
  pluginRegistryPath: ~/.claude/plugins/registry.json
  capabilityProfileRegistry: false
  launchConfigRegistry: false
  platformIdentityStrategy: delegated-to-harness
  updateChannelMechanism: npm
  supportedChannelKinds:
    - mcp-channel
  notes: |
    tula platform layer composes agent-platform's defineTask registry,
    plugin/skill/agent loader, and breakpoint policy engine. Inherits all
    agent-platform platform surfaces and adds barrel-export convenience for
    downstream consumers.
edges:
  realizes:
    - target: layer:6-agent-platform
  composes:
    - target: agent:tula
      role: platform
  bundles: []
