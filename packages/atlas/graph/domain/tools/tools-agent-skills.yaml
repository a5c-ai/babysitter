nodeKind: Tool
id: tool:cctop
attributes:
  displayName: "cctop"
  kind: other
  description: |
    htop-like terminal dashboard for monitoring Claude Code sessions in
    real-time. Displays active sessions, token usage, tool calls, costs,
    and system resource consumption in a TUI interface. Enables developers
    running multiple concurrent Claude Code sessions to monitor activity,
    spot runaway sessions, and track aggregate spend from a single
    terminal pane.
edges:
  tool_used_by:
    - target: skill-area:observability-instrumentation
    - target: skill-area:developer-experience
