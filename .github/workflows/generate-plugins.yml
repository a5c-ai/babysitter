name: Generate Plugins

# Disabled by default — enable by uncommenting the trigger
# on:
#   push:
#     branches: [main, staging]
#     paths:
#       - 'plugins/babysitter-unified/**'
#       - 'packages/agent-plugins-mux/**'
#   workflow_dispatch:

on:
  workflow_dispatch:
    inputs:
      commit_results:
        description: 'Commit generated plugins back to the branch'
        type: boolean
        default: false

concurrency:
  group: generate-plugins-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate Target Plugins
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Generate all target plugins
        run: |
          set -euo pipefail
          npm run generate:plugins

      - name: Compare with existing plugins
        id: compare_plugins
        continue-on-error: true
        run: |
          set -euo pipefail
          node scripts/generate-plugins.mjs --output generated --compare . --compare-only

      - name: Warn on manual plugin drift
        if: steps.compare_plugins.outcome == 'failure'
        run: echo "::warning::Generated plugins differ from the manually maintained plugins. Review the compare output before syncing them."

      - name: Upload generated plugins
        uses: actions/upload-artifact@v4
        with:
          name: generated
          path: generated/
          if-no-files-found: error

      - name: Commit generated plugins
        if: ${{ github.event.inputs.commit_results == 'true' }}
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add generated/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh generated plugins snapshot [skip staging]"
            if git push origin HEAD:$BRANCH_NAME 2>/dev/null; then
              echo "Generated plugins committed and pushed."
            elif git pull --rebase --autostash origin "$BRANCH_NAME" 2>/dev/null && git push origin HEAD:$BRANCH_NAME 2>/dev/null; then
              echo "Generated plugins committed after rebase."
            else
              echo "::warning::Could not push generated snapshot commit due to a concurrent branch update."
              git rebase --abort 2>/dev/null || true
            fi
          fi
