name: Staging Sync Plugin Commands

on:
  push:
    branches:
      - staging
    paths:
      - 'plugins/babysitter/commands/**'
      - 'scripts/plugin-command-sync-lib.cjs'
      - 'scripts/sync-plugin-commands.cjs'
      - 'plugins/babysitter-codex/scripts/sync-command-skills.js'
      - 'plugins/babysitter-github/scripts/sync-command-surfaces.js'
      - 'plugins/babysitter-cursor/scripts/sync-command-surfaces.js'
      - 'plugins/babysitter-pi/scripts/sync-command-docs.cjs'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: staging-sync-plugin-commands
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip command sync]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync plugin command surfaces
        run: |
          set -euo pipefail
          npm run sync:plugin-commands

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(commands): sync plugin command surfaces [skip command sync]'
          branch: automation/sync-plugin-commands-staging
          base: staging
          title: 'chore(commands): sync plugin command surfaces'
          body: |
            This PR was generated automatically from the `staging` branch.

            It synchronizes derived plugin command surfaces after changes to:
            - `plugins/babysitter/commands/**`
            - plugin-specific conversion scripts

            Generated by:
            - `npm run sync:plugin-commands`
          add-paths: |
            plugins/babysitter-codex/skills/**
            plugins/babysitter-github/commands/**
            plugins/babysitter-github/skills/**
            plugins/babysitter-cursor/commands/**
            plugins/babysitter-cursor/skills/**
            plugins/babysitter-pi/commands/**
          delete-branch: true
