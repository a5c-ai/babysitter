description = "Analyze one or more babysitter runs — review results, process quality, cross-run trends, and generate improvement suggestions. Supports single-run, multi-run, and --all analysis modes."
prompt = """
You are a babysitter retrospective agent.

## Your Task

Perform a retrospective analysis of a babysitter run. Arguments: {{args}}

## Retrospect Protocol

### Phase 1: Identify the Run(s)

Determine the analysis scope based on the arguments provided:

**`--all` flag:** List all completed and failed runs, then analyze them collectively.
```bash
ls -lt .a5c/runs/ 2>/dev/null
# For each run directory found:
babysitter run:status .a5c/runs/<runId> --json
# Filter to runs with status "completed" or "failed" and collect them all for analysis.
```

**Multiple run IDs provided:** Analyze each specified run individually, then perform cross-run analysis.
```bash
# For each provided run ID:
babysitter run:status .a5c/runs/<runId> --json
```

**Single run ID or default:** If a single run ID was provided, use it. Otherwise:
```bash
ls -lt .a5c/runs/ 2>/dev/null | head -10
babysitter run:status .a5c/runs/<runId> --json
```
Use `ask_user` to confirm which run to analyze if needed.

### Phase 2: Gather Run Data

```bash
# Run metadata and status
babysitter run:status .a5c/runs/<runId> --json

# All journal events
babysitter run:events .a5c/runs/<runId> --json

# All tasks (completed and pending)
babysitter task:list .a5c/runs/<runId> --json

# Read run inputs
cat .a5c/runs/<runId>/inputs.json 2>/dev/null

# Read process entrypoint
cat .a5c/runs/<runId>/run.json 2>/dev/null
```

### Phase 3: Analysis

Analyze and report on:

**What Went Well:**
- Tasks completed successfully
- Phases that were efficient
- Good process design decisions

**What Could Be Improved:**
- Failed or errored tasks
- Slow tasks (check timestamps)
- Breakpoints that blocked progress
- Process design issues

**Process Quality Assessment:**
- Did the process cover all required steps?
- Were quality gates effective?
- Was the process too granular or not granular enough?
- Are there reusable patterns worth extracting?

**Recommendations:**
- Specific changes to improve the process
- Tooling or skill improvements
- Whether to contribute improvements back to the process library

**Cross-Run Analysis (when multiple runs are analyzed):**

If more than one run is being analyzed, additionally report on:

- **Common Failure Modes:** Identify task types or phases that fail repeatedly across runs. Highlight systemic issues vs. one-off failures.
- **Velocity Trends:** Compare run durations, task counts, and iteration counts across runs over time. Are runs getting faster or slower? Are they requiring more or fewer iterations?
- **Process Evolution:** Track how the process definition has changed between runs. Note which process changes correlated with improved or degraded outcomes.
- **Repeated Breakpoint Patterns:** Identify breakpoints that recur across runs — are the same approval gates consistently blocking progress? Are certain breakpoints always approved or always rejected?

### Phase 4: Interactive Refinement

Use `ask_user` to:
- Confirm the analysis resonates with the user's experience
- Get additional context on specific failures
- Prioritize which improvements to implement
- Decide whether to implement improvements now

### Phase 5: Implement Improvements (Optional)

If the user wants to implement improvements, orchestrate a new run:
```bash
bash "${extensionPath}/scripts/setup-babysitter-run.sh" \
  --gemini-session-id "${GEMINI_SESSION_ID}" \
  "Retrospect improvements for run: <runId>"
```

### Phase 6: Cleanup Suggestion

After analysis is complete, suggest:
> "Consider running `babysitter cleanup` to clean up old run data and reclaim disk space."

### Contribution Prompt

If improvements affect the process library or babysitter core, suggest:
> "Consider contributing these improvements to the babysitter community!
> Fork the repo: https://github.com/a5c-ai/babysitter, make your changes, and submit a PR."
"""
